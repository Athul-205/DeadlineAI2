<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="neon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Dark backdrop to ensure high contrast in all browser tabs (light/dark) -->
  <rect width="32" height="32" rx="8" fill="#020617" />
  <!-- Futuristic clock / timeline ring -->
  <circle cx="16" cy="16" r="11" stroke="url(#neon-grad)" stroke-width="2" fill="none" opacity="0.3" />
  <!-- Dynamic active progress sweep -->
  <path d="M 16 5 A 11 11 0 0 1 27 16" stroke="url(#neon-grad)" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#glow)" />
  <!-- Lightning bolt / hourglass fusion core -->
  <path d="M 14 10 L 19 15 L 15 17 L 18 22 L 13 17 L 17 15 Z" fill="url(#neon-grad)" filter="url(#glow)" />
</svg>
